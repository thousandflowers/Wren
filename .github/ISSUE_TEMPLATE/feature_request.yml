name: Feature Request
description: Suggest an idea for Wren
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the pain point or missing capability?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
