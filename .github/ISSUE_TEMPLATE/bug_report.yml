name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 15.4
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Crash logs or console output
      description: Check ~/Library/Logs/Parrot/ for crash logs.
      render: text
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Type ...
        3. See ...
